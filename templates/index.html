<!DOCTYPE html>
<html>
<head>
<title>AI Stock Forecasting System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* Title */

.title{
font-size:38px;
margin-bottom:10px;
}

.subtitle{
margin-bottom:40px;
opacity:0.8;
}

/* Main container */

.main-container{
display:flex;
gap:40px;
}

/* Card */

.card{
background:white;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
color:#333;
box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

/* Inputs */

input[type="file"],
input[type="text"]{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

/* Buttons */

button{
width:100%;
padding:12px;
background:#2c5364;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#203a43;
}

h3{
margin-bottom:10px;
}

</style>

</head>

<body>

<h1 class="title">AI Stock Forecasting System</h1>
<p class="subtitle">ELM + BEL Hybrid Prediction Model</p>

<div class="main-container">

<!-- Dataset Upload -->

<div class="card">

<h3>Upload Dataset</h3>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="dataset" required>

<button type="submit">Predict from Dataset</button>

</form>

</div>


<!-- Real Time Stock -->

<div class="card">

<h3>Predict Real-Time Stock</h3>

<form action="/stock_predict" method="post">

<input type="text" name="ticker" placeholder="Enter Stock Symbol (AAPL)" required>

<button type="submit">Predict Stock</button>

</form>

</div>

</div>

</body>
</html>
